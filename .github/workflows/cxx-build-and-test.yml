name: Build and Test C++

on:
  - push
  - pull_request

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true
      - name: Install Dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y clang cmake
      - name: Build Tests
        run: |
          mkdir -p tests/build && cd tests/build
          cmake ..
          make -j$(getconf _NPROCESSORS_ONLN)
      - name: Run Tests
        run: |
          tests/build/tests --reporter console --reporter JUnit::out=tests.xml
      - name: Build and Test Examples
        run: |
          mkdir -p examples/build && cd examples/build
          cmake ..
          make -j$(getconf _NPROCESSORS_ONLN)
          ./random_weighted
          ./random_permutation
      - name: Create Test Report
        uses: dorny/test-reporter@v3
        if: success() || failure()
        with:
          name: C++ Test Report
          path: tests.xml
          reporter: java-junit
